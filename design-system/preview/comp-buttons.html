<!-- @dsCard group="Components" -->
<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--sup-carvao);color:#fff}
  .wrap{padding:24px 28px}
  .lbl{font-size:11px;color:var(--sup-cinza);margin:0 0 16px;letter-spacing:.16em;text-transform:uppercase;font-weight:600}
  .row{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
  .btn{font-family:var(--sup-font);font-weight:700;font-size:14px;border-radius:10px;padding:12px 22px;border:none;cursor:pointer;letter-spacing:.01em}
  .pri{background:#D62828;color:#fff}
  .pri.hover{background:#B71C1C}
  .sec{background:transparent;color:#fff;border:1px solid var(--sup-linha-forte)}
  .ghost{background:transparent;color:#9A9A9A;border:none;padding-left:8px;padding-right:8px}
  .pill{background:#D62828;color:#fff;border-radius:999px;padding:12px 26px;font-weight:700;font-size:14px;border:none}
  .st{font-size:10px;color:var(--sup-cinza-esc);margin-top:7px;text-align:center}
  .col{display:flex;flex-direction:column;align-items:center}
</style></head>
<body><div class="wrap">
  <p class="lbl">Botões · estados</p>
  <div class="row">
    <div class="col"><button class="btn pri">Peça agora</button><div class="st">primário</div></div>
    <div class="col"><button class="btn pri hover">Peça agora</button><div class="st">hover / press</div></div>
    <div class="col"><button class="btn sec">Ver cardápio</button><div class="st">secundário</div></div>
    <div class="col"><button class="btn ghost">Saiba mais →</button><div class="st">fantasma</div></div>
    <div class="col"><button class="pill">Adicionar à sacola</button><div class="st">pill / CTA</div></div>
  </div>
</div></body></html>
