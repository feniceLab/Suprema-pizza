<!-- @dsCard group="Colors" -->
<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--sup-carvao);font-family:var(--sup-font);color:#fff}
  .wrap{padding:22px 24px}
  .row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
  .sw{border-radius:var(--sup-r-md);overflow:hidden;border:1px solid var(--sup-linha)}
  .chip{height:74px}
  .meta{padding:8px 10px;background:var(--sup-grafite)}
  .nm{font-size:11.5px;font-weight:700}
  .hex{font-size:10.5px;color:var(--sup-cinza);font-variant-numeric:tabular-nums;text-transform:uppercase}
  .lbl{font-size:11px;color:var(--sup-cinza);margin:0 0 14px;letter-spacing:.16em;text-transform:uppercase;font-weight:600}
</style></head>
<body><div class="wrap">
  <p class="lbl">Superfícies · Tema escuro</p>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#0F0F0F"></div><div class="meta"><div class="nm">Carvão</div><div class="hex">#0F0F0F</div></div></div>
    <div class="sw"><div class="chip" style="background:#161616"></div><div class="meta"><div class="nm">Grafite</div><div class="hex">#161616</div></div></div>
    <div class="sw"><div class="chip" style="background:#1F1F1F"></div><div class="meta"><div class="nm">Grafite 2</div><div class="hex">#1F1F1F</div></div></div>
    <div class="sw"><div class="chip" style="background:#2A2A2A"></div><div class="meta"><div class="nm">Grafite 3</div><div class="hex">#2A2A2A</div></div></div>
    <div class="sw"><div class="chip" style="background:#000000"></div><div class="meta"><div class="nm">Preto</div><div class="hex">#000000</div></div></div>
  </div>
</div></body></html>
