<!-- @dsCard group="Type" -->
<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--sup-carvao);color:#fff}
  .wrap{padding:20px 24px;display:flex;gap:22px;align-items:center}
  .shot{position:relative;width:200px;height:300px;border-radius:14px;overflow:hidden;flex-shrink:0;background:#222 center/cover}
  .cap{position:absolute;top:26px;left:0;right:0;text-align:center;padding:0 18px}
  .cap span{ -webkit-box-decoration-break:clone;box-decoration-break:clone;background:#FFEBDC;color:#1A1A1A;padding:.08em .3em;border-radius:.5em;box-shadow:-.14em 0 0 #FFEBDC,.14em 0 0 #FFEBDC;font-size:15px;line-height:1.7}
  .l1{font-weight:400}.l2{font-weight:700}
  .logo{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);width:96px;opacity:.92}
  .note{font-size:12.5px;color:var(--sup-cinza);line-height:1.7}
  .note b{color:#fff;font-weight:600}
  .note code{background:var(--sup-grafite-2);color:#E84B4B;padding:1px 6px;border-radius:5px;font-size:11.5px}
</style></head>
<body><div class="wrap">
  <div class="shot" style="background-image:url('../assets/photos/foto-30.jpg')">
    <div class="cap"><span class="l1">Massa fresca, do jeito que</span> <span class="l2">a gente faz há anos.</span></div>
    <img class="logo" src="../assets/logo-suprema-branco.png" alt="">
  </div>
  <div class="note">
    <b>Legenda social — "halo bege".</b><br>
    Linha 1 em <b>Regular</b> (gancho), linha 2 em <b>Bold</b> (punchline). Fundo <code>#FFEBDC</code> como halo dilatado de cantos orgânicos — <b>nunca</b> caixa retangular. Logo branca no rodapé.
  </div>
</div></body></html>
