<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">
<style>
  html,body{margin:0;background:#0F0F0F;font-family:'Poppins',sans-serif;color:#fff}
  .wrap{padding:18px 20px}
  .lbl{font-size:11px;color:#9A9A9A;margin:0 0 12px;letter-spacing:.16em;text-transform:uppercase;font-weight:600}
  .strip{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
  .ph{aspect-ratio:3/4;border-radius:10px;background:#222 center/cover;border:1px solid rgba(255,255,255,.06)}
</style></head>
<body><div class="wrap">
  <p class="lbl">Fotografia · quente, apetitosa, real</p>
  <div class="strip">
    <div class="ph" style="background-image:url('../assets/photos/foto-01.jpg')"></div>
    <div class="ph" style="background-image:url('../assets/photos/foto-60.jpg')"></div>
    <div class="ph" style="background-image:url('../assets/photos/foto-30.jpg')"></div>
    <div class="ph" style="background-image:url('../assets/photos/foto-110.jpg')"></div>
    <div class="ph" style="background-image:url('../assets/photos/foto-100.jpg')"></div>
  </div>
</div></body></html>
