<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">
<style>
  html,body{margin:0;background:#0F0F0F;font-family:'Poppins',sans-serif;color:#fff}
  .wrap{padding:22px 28px;display:flex;align-items:center;gap:34px}
  .sig{display:flex;align-items:center;gap:10px;width:230px}
  .rule{flex:1;height:2px;background:#D62828}
  .x{color:#D62828;font-size:26px;line-height:1;font-weight:700;flex-shrink:0}
  .note{font-size:12.5px;color:#9A9A9A;line-height:1.7;max-width:300px}
  .note b{color:#fff;font-weight:600}
</style></head>
<body><div class="wrap">
  <div class="sig">
    <div class="rule"></div>
    <div class="x">&#10005;</div>
    <div class="rule"></div>
  </div>
  <div class="note"><b>Grafismo-assinatura.</b> Rolinhos de massa cruzados (✕) no centro de uma linha horizontal — extraído do logo. Funciona como selo em embalagens, rodapés e cartões. Sempre em <b style="color:#E84B4B">vermelho</b> sobre claro ou <b>branco</b> sobre escuro.</div>
</div></body></html>
