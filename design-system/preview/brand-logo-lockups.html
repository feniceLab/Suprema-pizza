<!-- @dsCard group="Brand" -->
<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">
<style>
  html,body{margin:0;font-family:'Poppins',sans-serif}
  .wrap{display:grid;grid-template-columns:1fr 1fr}
  .cell{height:190px;display:flex;align-items:center;justify-content:center;position:relative}
  .light{background:#FFFFFF}
  .dark{background:#0F0F0F}
  .cell img{width:200px}
  .tag{position:absolute;bottom:10px;left:12px;font-size:10px;letter-spacing:.14em;text-transform:uppercase;font-weight:600}
  .light .tag{color:#9A9A9A}
  .dark .tag{color:#6E6E6E}
</style></head>
<body><div class="wrap">
  <div class="cell light"><img src="../assets/logo-suprema-vermelho.png" alt="Logo vermelha"><span class="tag">Vermelha · fundo claro</span></div>
  <div class="cell dark"><img src="../assets/logo-suprema-branco.png" alt="Logo branca"><span class="tag">Branca · fundo escuro / foto</span></div>
</div></body></html>
