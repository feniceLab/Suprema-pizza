<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--sup-carvao);color:#fff}
  .wrap{padding:22px 28px}
  .item{padding:9px 0;border-bottom:1px solid var(--sup-linha)}
  .item:last-child{border:none}
  .tag{font-size:10px;color:var(--sup-cinza);letter-spacing:.14em;text-transform:uppercase;margin-bottom:3px}
  .kick{font-weight:600;font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--sup-vermelho)}
  .h3{font-weight:700;font-size:22px}
  .p{font-weight:400;font-size:15px;color:var(--sup-cinza);line-height:1.6;margin:0}
  .price{font-weight:700;color:var(--sup-vermelho);font-size:20px}
</style></head>
<body><div class="wrap">
  <div class="item"><div class="tag">Kicker · 600 · .22em</div><div class="kick">Cardápio</div></div>
  <div class="item"><div class="tag">H3 · Poppins 700 · 22</div><div class="h3">Camarão com Borda de Cheddar</div></div>
  <div class="item"><div class="tag">Corpo · Poppins 400 · 15/1.6</div><p class="p">Massa fresca de fermentação lenta, queijo que escorre e borda alta dourada. Do forno direto pra sua casa.</p></div>
  <div class="item"><div class="tag">Preço · 700 · tabular</div><div class="price">R$ 91,00</div></div>
</div></body></html>
