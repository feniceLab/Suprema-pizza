<!-- @dsCard group="Components" -->
<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--sup-carvao);color:#fff}
  .wrap{padding:22px 24px;display:flex;gap:16px}
  .card{width:300px;background:var(--sup-grafite);border:1px solid var(--sup-linha);border-radius:16px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.45)}
  .ph{height:150px;background:#222 center/cover}
  .body{padding:14px 16px}
  .tag{font-size:10.5px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:#E84B4B}
  .nm{font-weight:700;font-size:17px;margin:5px 0 4px}
  .ds{font-size:12.5px;color:var(--sup-cinza);line-height:1.5;margin:0 0 12px}
  .ft{display:flex;align-items:center;justify-content:space-between}
  .pr{font-weight:700;color:#D62828;font-size:19px}
  .add{background:#D62828;color:#fff;border:none;border-radius:999px;width:38px;height:38px;font-size:20px;cursor:pointer}
</style></head>
<body><div class="wrap">
  <div class="card">
    <div class="ph" style="background-image:url('../assets/photos/foto-60.jpg')"></div>
    <div class="body">
      <div class="tag">Especial</div>
      <div class="nm">Calabresa Premium</div>
      <p class="ds">Calabresa artesanal, muçarela e molho da casa na borda alta.</p>
      <div class="ft"><span class="pr">R$ 91,00</span><button class="add">+</button></div>
    </div>
  </div>
  <div class="card">
    <div class="ph" style="background-image:url('../assets/photos/foto-100.jpg')"></div>
    <div class="body">
      <div class="tag">Combo</div>
      <div class="nm">Gigante 4 Sabores</div>
      <p class="ds">45cm · 16 fatias · até 4 sabores + Guaraná 1,5L.</p>
      <div class="ft"><span class="pr">R$ 109,00</span><button class="add">+</button></div>
    </div>
  </div>
</div></body></html>
