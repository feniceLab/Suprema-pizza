<!-- @dsCard group="Colors" -->
<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--sup-carvao);font-family:var(--sup-font);color:#fff}
  .wrap{padding:22px 24px}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .sw{border-radius:var(--sup-r-md);overflow:hidden;border:1px solid var(--sup-linha)}
  .chip{height:74px}
  .meta{padding:8px 10px;background:var(--sup-grafite)}
  .nm{font-size:12px;font-weight:700;letter-spacing:.01em}
  .hex{font-size:11px;color:var(--sup-cinza);font-variant-numeric:tabular-nums;text-transform:uppercase}
  .lbl{font-size:11px;color:var(--sup-cinza);margin:0 0 14px;letter-spacing:.16em;text-transform:uppercase;font-weight:600}
</style></head>
<body><div class="wrap">
  <p class="lbl">Primária · Vermelho Suprema</p>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#D62828"></div><div class="meta"><div class="nm">Vermelho</div><div class="hex">#D62828</div></div></div>
    <div class="sw"><div class="chip" style="background:#B71C1C"></div><div class="meta"><div class="nm">Vermelho DK</div><div class="hex">#B71C1C</div></div></div>
    <div class="sw"><div class="chip" style="background:#E84B4B"></div><div class="meta"><div class="nm">Vermelho LT</div><div class="hex">#E84B4B</div></div></div>
    <div class="sw"><div class="chip" style="background:#C0392B"></div><div class="meta"><div class="nm">Brasa</div><div class="hex">#C0392B</div></div></div>
  </div>
</div></body></html>
