<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--sup-carvao);color:#fff}
  .wrap{padding:24px 28px}
  .lbl{font-size:11px;color:var(--sup-cinza);margin:0 0 16px;letter-spacing:.16em;text-transform:uppercase;font-weight:600}
  .row{display:flex;align-items:flex-end;gap:18px}
  .col{display:flex;flex-direction:column;align-items:center;gap:7px}
  .bar{background:var(--sup-vermelho);border-radius:3px;width:26px}
  .t{font-size:11px;color:#fff;font-weight:600}
  .v{font-size:10px;color:var(--sup-cinza)}
</style></head>
<body><div class="wrap">
  <p class="lbl">Espaçamento · escala base 4px</p>
  <div class="row">
    <div class="col"><div class="bar" style="height:4px"></div><div class="t">s1</div><div class="v">4</div></div>
    <div class="col"><div class="bar" style="height:8px"></div><div class="t">s2</div><div class="v">8</div></div>
    <div class="col"><div class="bar" style="height:12px"></div><div class="t">s3</div><div class="v">12</div></div>
    <div class="col"><div class="bar" style="height:16px"></div><div class="t">s4</div><div class="v">16</div></div>
    <div class="col"><div class="bar" style="height:24px"></div><div class="t">s5</div><div class="v">24</div></div>
    <div class="col"><div class="bar" style="height:32px"></div><div class="t">s6</div><div class="v">32</div></div>
    <div class="col"><div class="bar" style="height:48px"></div><div class="t">s7</div><div class="v">48</div></div>
    <div class="col"><div class="bar" style="height:64px"></div><div class="t">s8</div><div class="v">64</div></div>
  </div>
</div></body></html>
