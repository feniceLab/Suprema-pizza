<!-- @dsCard group="Spacing" -->
<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--sup-carvao);color:#fff}
  .wrap{padding:24px 28px;display:grid;grid-template-columns:1fr 1fr;gap:26px}
  .lbl{font-size:11px;color:var(--sup-cinza);margin:0 0 14px;letter-spacing:.16em;text-transform:uppercase;font-weight:600}
  .radii{display:flex;gap:14px;align-items:flex-end}
  .rbox{background:var(--sup-grafite-2);border:1px solid var(--sup-linha-forte);width:54px;height:54px}
  .rt{font-size:10px;color:var(--sup-cinza);text-align:center;margin-top:6px}
  .elev{display:flex;flex-direction:column;gap:12px}
  .ecard{background:var(--sup-grafite);border-radius:12px;padding:10px 14px;font-size:11.5px;color:var(--sup-cinza)}
  .e1{box-shadow:0 1px 2px rgba(0,0,0,.4)}
  .e2{box-shadow:0 8px 24px rgba(0,0,0,.45)}
  .e3{box-shadow:0 18px 48px rgba(0,0,0,.6)}
  .eg{box-shadow:0 0 0 1px rgba(214,40,40,.35),0 10px 30px rgba(214,40,40,.18)}
</style></head>
<body><div class="wrap">
  <div>
    <p class="lbl">Raios</p>
    <div class="radii">
      <div><div class="rbox" style="border-radius:6px"></div><div class="rt">sm · 6</div></div>
      <div><div class="rbox" style="border-radius:10px"></div><div class="rt">md · 10</div></div>
      <div><div class="rbox" style="border-radius:16px"></div><div class="rt">lg · 16</div></div>
      <div><div class="rbox" style="border-radius:24px"></div><div class="rt">xl · 24</div></div>
      <div><div class="rbox" style="border-radius:999px"></div><div class="rt">pill</div></div>
    </div>
  </div>
  <div>
    <p class="lbl">Elevação / sombra</p>
    <div class="elev">
      <div class="ecard e1">sh-1 · sutil</div>
      <div class="ecard e2">sh-2 · card</div>
      <div class="ecard e3">sh-3 · modal</div>
      <div class="ecard eg">glow · foco vermelho</div>
    </div>
  </div>
</div></body></html>
