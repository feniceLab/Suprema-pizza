<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--sup-carvao);color:#fff}
  .wrap{padding:24px 28px}
  .item{padding:10px 0;border-bottom:1px solid var(--sup-linha)}
  .item:last-child{border:none}
  .tag{font-size:10.5px;color:var(--sup-cinza);letter-spacing:.14em;text-transform:uppercase;margin-bottom:4px}
  .d1{font-family:var(--sup-font);font-weight:800;font-size:46px;line-height:.98;text-transform:uppercase;letter-spacing:-.01em}
  .d2{font-family:var(--sup-font);font-weight:800;font-size:30px;line-height:1;text-transform:uppercase}
</style></head>
<body><div class="wrap">
  <div class="item"><div class="tag">H1 · Poppins 800 · clamp 34–64 · uppercase</div><div class="d1">A pizza tá no ponto</div></div>
  <div class="item"><div class="tag">H2 · Poppins 800 · clamp 26–40 · uppercase</div><div class="d2">Sabores em destaque</div></div>
</div></body></html>
