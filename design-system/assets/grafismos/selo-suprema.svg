<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 150" role="img" aria-label="Selo Suprema — rolinhos de massa cruzados">
  <!-- Selo "X" dos rolinhos cruzados (±34°), vindo do topo da logo.
       Versionado · Fenice Lab · 2026
       Cor controlada por CSS: fill:currentColor segue a cor do texto.
       Variantes prontas: selo-suprema-vermelho/branco/bege.svg -->
  <title>Selo Suprema — rolinhos cruzados</title>
  <g fill="currentColor">
    <g transform="rotate(34 110 75)">
      <rect x="34" y="64" width="152" height="22" rx="11"/>
      <rect x="20" y="58" width="14" height="34" rx="5"/>
      <rect x="186" y="58" width="14" height="34" rx="5"/>
    </g>
    <g transform="rotate(-34 110 75)" opacity=".82">
      <rect x="34" y="64" width="152" height="22" rx="11"/>
      <rect x="20" y="58" width="14" height="34" rx="5"/>
      <rect x="186" y="58" width="14" height="34" rx="5"/>
    </g>
  </g>
</svg>
